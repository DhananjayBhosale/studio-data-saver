name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  macos-app:
    runs-on: macos-14
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Build release zip
        run: ./scripts/package_release.sh

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Studio Data Saver
          path: |
            dist/Studio Data Saver-*.zip
            dist/Studio Data Saver-*.zip.sha256
            dist/Studio Data Saver-*.dmg
            dist/Studio Data Saver-*.dmg.sha256
